<div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-info border-bottom box-shadow">
    <h5 class="my-0 mr-md-auto font-weight-normal">Магазин цветов</h5>
    <nav class="ms-5">
        <a class="p-2 btn btn-outline-dark" href="{% url 'catalog:product_list' %}">Каталог</a>
        <a class="p-2 btn btn-outline-dark" href="{% url 'catalog:contacts' %}">Контакты</a>
        <a class="p-2 btn btn-outline-dark" href="{% url 'catalog:product_create' %}">Создать продукт</a>
        {% if user.is_authenticated %}
        <form method="post" action="{% url 'users:logout' %}" style="display: inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-dark" >Выйти</button>
        </form>
        {% else %}
        <a class="p-2 btn btn-outline-dark" href="{% url 'users:login' %}">Войти</a>
        <a class="p-2 btn btn-outline-dark" href="{% url 'users:register' %}">Регистрация</a>
        {% endif %}
    </nav>
</div>
